name: The Guard — GrabOn LLM Eval Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    paths:
      - "prompts/**"
      - "providers/**"
      - "scorer/**"
      - "stats/**"
      - "tests/**"
      - "tests.json"
      - "agent.py"
      - "run_eval.py"
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Update baseline after eval (yes/no)"
        required: false
        default: "no"
      provider:
        description: "Run only one provider (openai/gemini/groq/all)"
        required: false
        default: "all"

jobs:
  eval:
    name: Run Eval Suite
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p logs baselines reports history/prompts

      - name: Restore baselines cache
        uses: actions/cache@v4
        with:
          path: baselines/
          key: baselines-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            baselines-${{ github.ref_name }}-
            baselines-main-

      - name: Validate setup (dry run)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_eval.py --dry-run

      - name: Run eval pipeline
        id: eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          UPDATE_FLAG=""
          PROVIDER_FLAG=""
          if [ "${{ github.event.inputs.update_baseline }}" = "yes" ]; then
            UPDATE_FLAG="--update-baseline"
          fi
          if [ "${{ github.event.inputs.provider }}" != "" ] && \
             [ "${{ github.event.inputs.provider }}" != "all" ]; then
            PROVIDER_FLAG="--provider ${{ github.event.inputs.provider }}"
          fi
          python run_eval.py $UPDATE_FLAG $PROVIDER_FLAG
        continue-on-error: true

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_id }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: Post report as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const glob = require('@actions/glob');
            const globber = await glob.create('reports/*.md');
            const files = await globber.glob();
            if (files.length === 0) { console.log('No report found'); return; }
            const body = fs.readFileSync(files[files.length - 1], 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.substring(0, 65000),
            });

      - name: Save baselines cache
        if: always()
        uses: actions/cache@v4
        with:
          path: baselines/
          key: baselines-${{ github.ref_name }}-${{ github.sha }}

      # ── GO / NO-GO gate ─────────────────────────────────────────────
      # Exit code 0 = GO, 1 = NO-GO (blocks merge), 2 = INCONCLUSIVE
      - name: Check eval result — block on NO-GO
        run: |
          EXIT=${{ steps.eval.outputs.exit_code }}
          if [ "${{ steps.eval.outcome }}" = "failure" ]; then
            if grep -q "NO-GO" reports/*.md 2>/dev/null; then
              echo "❌ NO-GO — regression detected. PR blocked."
              exit 1
            fi
            echo "⚠ Eval step failed for non-regression reason."
            exit 1
          fi
          echo "✅ GO — no regressions detected."
