name: The Guard - GrabOn LLM Eval Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    paths:
      - "prompts/**"
      - "providers/**"
      - "scorer/**"
      - "stats/**"
      - "tests/**"
      - "tests.json"
      - "agent.py"
      - "run_eval.py"
      - "detector/**"
      - "versioning/**"
      - "dashboard/**"
      - "history/**"
      - ".github/workflows/eval.yml"
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Update baseline after eval (yes/no)"
        required: false
        default: "no"
      provider:
        description: "Run only one provider (openai/gemini/groq/all)"
        required: false
        default: "all"

jobs:
  eval:
    name: Run Eval Suite
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p logs baselines reports history/prompts

      - name: Restore baselines cache
        uses: actions/cache@v4
        with:
          path: baselines/
          key: baselines-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            baselines-${{ github.ref_name }}-
            baselines-main-

      - name: Validate setup (dry run)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_eval.py --dry-run

      - name: Run eval pipeline
        id: eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          set +e
          UPDATE_FLAG=""
          PROVIDER_FLAG=""
          if [ "${{ github.event.inputs.update_baseline }}" = "yes" ]; then
            UPDATE_FLAG="--update-baseline"
          fi
          if [ "${{ github.event.inputs.provider }}" != "" ] && [ "${{ github.event.inputs.provider }}" != "all" ]; then
            PROVIDER_FLAG="--provider ${{ github.event.inputs.provider }}"
          fi

          python run_eval.py $UPDATE_FLAG $PROVIDER_FLAG
          EXIT_CODE=$?

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          case "$EXIT_CODE" in
            0) echo "decision=GO" >> "$GITHUB_OUTPUT" ;;
            1) echo "decision=NO-GO" >> "$GITHUB_OUTPUT" ;;
            2) echo "decision=INCONCLUSIVE" >> "$GITHUB_OUTPUT" ;;
            *) echo "decision=ERROR" >> "$GITHUB_OUTPUT" ;;
          esac

          exit 0

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_id }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: Post report as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const glob = require('@actions/glob');
            const globber = await glob.create('reports/*.md');
            const files = await globber.glob();
            if (files.length === 0) {
              console.log('No report found');
              return;
            }
            const body = fs.readFileSync(files[files.length - 1], 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.substring(0, 65000),
            });

      - name: Save baselines cache
        if: always()
        uses: actions/cache@v4
        with:
          path: baselines/
          key: baselines-${{ github.ref_name }}-${{ github.sha }}

      - name: Check eval result
        shell: bash
        run: |
          EXIT_CODE="${{ steps.eval.outputs.exit_code }}"
          DECISION="${{ steps.eval.outputs.decision }}"

          echo "Eval exit code: $EXIT_CODE"
          echo "Eval decision: $DECISION"

          if [ "$EXIT_CODE" = "0" ]; then
            echo "GO - no regressions detected."
            exit 0
          fi

          if [ "$EXIT_CODE" = "1" ]; then
            echo "NO-GO - regression detected. PR blocked."
            exit 1
          fi

          if [ "$EXIT_CODE" = "2" ]; then
            echo "INCONCLUSIVE - baseline missing or insufficient data. Manual review required."
            exit 1
          fi

          echo "Eval failed for an unexpected reason."
          exit 1
